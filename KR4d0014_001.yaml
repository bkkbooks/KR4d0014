body:
  text: 穆參軍集卷上宋穆修撰詩江南寒食江南水國春光饒清明上已多招邀花陰連絡青草岸栁色掩映紅䦨橋歌調謳啞雜吳俗髻鬟疏削傳南朝誰憐北客歸未去楚魄湘魂惟暗消送毛得一秀才歸淮上江天梅雨晝蕭蕭送别愁吟白紵謠處士才高融未薦騷人魄斷玉方招自傷櫪驥心千里空羡冥鵬志九霄酒罷征鞍迢遞去不堪回首木蘭橈君歸迢遞淮西路我客蕭條秋浦城惻惻相看復惻惻行行送别重行行途中猿鳥哀聲斷馬上雲山逺碧橫富貴窮通俱未決直傾尊酒沃離情食魚南有嘉魚異常趨四月期江天專伺至烟網密􅊻垂乍戲汀蘋末初循水荇湄競搖輕舴艋寬罩碧漣漪占浦搜深藻空波出素鬐數頭餘赤質二色類銀姿貨鬻斯為切鮮腴敢暇知青錢邀價值華屋市新竒珠沫緣條煦霜鱗逐刃隳扣顱瓊聚骨剖腋錦分肌味佐芳菘愜香參苦筍宜羮甌融膩玉膾筯胃一作縷寒絲湘鱓非吾偶河魴孰與夷薦新奚尚鮪稔毒即殊􅀈鱸訝休官易鯖嫌醒酒遲自當頻佐膳所惜易過時魯從事清暉閣庾郎真好事溪閣斬新開水石精神出江山氣色來疏烟分鷺立逺靄見帆回公退資清興閒吟倚檻裁送葛源之太和主簿勿嘆從卑位聊欣適去情秋風九月急飛鳥一帆輕鱠斫江鱗活杯嘗楚釀清歡一作權華莫回首寵辱正堪驚送靈師歸吳靈師殊可尚頗不類浮屠託迹雖依佛留心獨喜儒風塵倦京洛水石隱句吳破寺杉松老南歸舊隱孤江南春杜若溪邊待釣船怨紅傷翠助鸝鵑戰回春事青蒲劔買破韶光緑荇錢千嶂逺圍芳草國一江晴浸斷霞天未知多感多愁客何處偷尋甕底眠寒食江邊又寒食傖客奈離襟恨滿王孫草愁多望帝禽雞毬輕薄事歌酒宴遊心盡付吳兒輩惟知屏跡深江上送陳翹還無為江上寂寥春雨晴江邊冉冉春潮平相逢未盡斗酒醉相送又速孤舟行篁竹窮鎖秋浦郡烟波渺隔無為城音塵兩地不千里勿負使君金玉聲殘春病酲風簷窣窣燕哰哰卧對殘芳起鬱陶乍困遊車一作鞍春尚在未扶醒枕日初高煩腸屢沃痟難解病髮慵簪癢更搔欲為風光輕賦别正無憀賴染江毫書事覺菴惠澤涵濡四海同微生曾莫預昆蟲不參品物陶鎔外獨作窮人蓋載中深穽已顛猶磷石危苕將籜更推風一家寄命嗟無地何負神明與上穹和毛秀才江墅幽居好十首滎陽毛生有墅在宣城之南陵嘗作村居詩十首其詩用律格五言四韻每篇皆同上之一句元和長慶來詩人多是體生之往還躡而和者數人暨攜北來出以相示豫諷其篇而悅其事既恨未得往從之遊喜用其韻而繼之得以盛言生所居之樂宣城實江外之郡而墅且在焉因首用是句江墅幽居好當門看水田鳧鷗閒夕照粳稻秀原烟野屐無完齒山衣有敗肩遙聞雙闕下簫鼓樂豐年江墅幽居好南塘枕野亭菰蒲顫風緑菱荇蓋波青繫葦一漁艇翹烟雙雪翎相攜二三叟扶醉不曾醒江墅幽居好溪山數里長徑通茶塢緑門枕橘園香藉石還勝榻聽松不讓簧閒遊驚里巷自作隱淪裝江墅幽居好老農時欸扉濁醪時共醉野話坦無機山雨欲到檻竹風先滿衣溪南秋更樂稻熟又魚肥江墅幽居好賔來定不愁酒醲新出壓魚活旋離鈎移席追松影調琴和澗流陶然方外樂名教縶何由江墅幽居好柴關帶竹籬田頭餉耕後樹裏灌園時鄰靜鳴秋織樵閒對野棋扺巇非我事大笑引蘇錐江墅幽居好名山對九華疏篁十餘畝古屋兩三家碓下雞爭黍籬根虺逐蛙水邊閒送目獨鳥在秋槎江墅幽居好何妨鄙事添神隨山父賽筮學野人占露草牛羊喜秋霖黍豆嫌短牆衰栁下寒水半渠淹江墅幽居好身如醉伯倫浮名拋可得荒宴罷何因酩酊乘籃􅓅逍遙岸角巾人間莫回首容僞不容真江墅幽居好人閒晚最孤魚臨溪樹釣鳥隔水烟呼野竹掛薜荔山花眠鷓鴣畫工能狀出羞殺輞川圖燭一箔珠簾掩映垂房櫳清染麝烟煤佳人盼影橫哀柱狎客分光綴艷詩禁鎖翠明初唱漏宫窗紅短尚圍棋長宵且秉歡遊去無限風情見古辭過西京西京千古帝王宫無限名園水竹中來恨不逢桃李日滿城紅樹正秋風賦催糚嚴糚應在繡閨中似鬭春芳拆曉風試問夭桃臨碧沼何如艷質對青銅送孫立東遊詩筆知名曾刻苦文章多難久飄流睢陽縱酒黃金盡提劔東方暫一遊村郭寒食雨中寂寥村郭見寒食風光更著微雨遮秋遷閒垂愁稚子楊栁半濕眠春鴉白社皆驚放狂客青錢盡送沽酒家眼前不得醉消遣爭奈惱人紅杏花清明連上已改火清明度湔衫上已連芳辰來屬續遊士困聨翩酒帳經旬直花司併日權俠兒狂不足猶恨促春妍合歡芍藥薰風對拆芳心破浩露雙滋粉面新油碧車中同載女菱花鑑裏並糚人皇英帝子鍾遺艷琬琰宫姬託後身誰道獨呈芳瑞晚也勝常調牡丹春故侯園池館年來瓦礫存路旁看取故侯園身前便作荒凉計祗樹芳菲不樹恩送定師南遊營營學佛徒皆喜訾吾道憐師獨異羣儒藝知探討誦詩三四章往往見詞藻玉璞在琢磨不難成至寶知余本好古心服仁義老勤請送行詩安足慰枯槁别時汝潁路凉葉經秋早南逰何當還江潭無限好心作身經作驚送人主邊寨豈憚河湟逺男兒效主恩窮邊人不到孤戍自分屯馬放胡沙暖烽傳塞日昏軍前初謁帥戎服走轅門巨盜嗣皇登位始凝旒巨盜尋并相印收漢室有靈誅賊冀虞廷無患放凶兜猿狙豈稱周公任豺虎猶寬巷伯投願斬都衡謝天下不然何用正王猷汝陰偶書呈一二知已汝陰窮掾計何疏四十無成坐諷書不務功名師捭闔獨將仁義守蘧廬敢同賈傅希前席况異鄒生託後車除泥諸公時一醉等閒猶且忘歸歟除夜燈前清淚落衣間守嵗分為客是閒老母今春年七十壽觴爭忍對慈顔城南五題野水岸邊逢草歇平林烟畔逐花行雨晴南陌塵埃死倍覺風光奪眼明郊步水曲臨幽獨杖藜郫筒香入亂花攜輕肥不得尋春意動要笙歌入馬蹄獨遊名園雖自屬侯家任客閒遊到日斜富貴位高無暇出主人空看折來花貴侯園閒登朱亥遊俠墓却望梁王歌吹臺臺上墓邊芳草緑遊人心事立徘徊朱亥墓君王未到玉津遊萬樹紅芳相倚愁金鎖不開春寂寂落花飛出粉牆頭玉津園燈杳杳有時當永恨依依何處照閒眠靜臨客枕愁寒雨逺逐漁篷耿暝烟纎影乍欹還復立冷花時結不成圓銷魂猶憶江樓夜曽對離觴賦短篇登莒子臺莒國丘壟在莒臺荆棘深憑高一極目懷古重傷心平楚蒼烟暝邊風白日沈誰論客懷抱灌木自悲吟希言官舍種花才初看君栽小園已報新花著桃李感時眷物情何多發咏長篇託興比為言桃李富花實君子盛德尤所似蒨蒨相倚臨芳辰輔導春功如宰揆旁有百卉爭妍舒特煩花匠施劂剞刻鏤也誇紅鬭紫亦可憐各事繁華一時爾繁盛寧將此花同令人慕玩狂不已羲和奔御催春歸祗得銜杯且歡喜君看灼灼枝上英半雜泥塵成落蕊盛衰不獨草木然人事悠悠盡如此登女郎臺臺前流水眼波明臺上閒雲鬢葉輕莫把姑蘇逺相比不曾亡國只傾城女郎名字本風流好與州人作勝遊倘使此臺呼醜女汝陰城裏一荒丘友人燒筍之約未赴久約燒林筍何時㑹勝園未嘗清氣味且厭俗盤飱漸痛烟犀老方憐露錦繁如何玉川子苦惜籜龍寃别穀熟尉李七同年騎驢登縣門屑屑復何言留館竺乾舍屢攜梅福尊凶荒岐路梗冰雪嵗時昏明日别君去依然蓬跡奔樊博士化州監鹽監鹽已非職况復極南之莫識州名化徒聞水涉灕樹驚人面果俗駭鳥言夷去去唯強飰徴還嵗可期丙寅春雨天地開春暉羣陰爭閉之行行二月路寒威切人肌淫雨恣凌虐淹旬下無時頑雲掃復合直向平地垂蒸人共愁嘆萬物皆瘡痍衆木有芳華摧沮不得施青苞斂絳萼同向枝上萎宿麥悲已病泥中聊參差嘉穀失播種雖晴諒胡為蠢彼田中氓豈惟念身饑州縣責常賦嗷嗷訴之誰幸不為盜起多應盡流離吁嗟致此異其咎安所尸悒悒窮巷士屏身伏茅茨讀書抗前古得失心頗窺天理不難究可以人事知且欲上其說懼非已所宜有職彼尚默未當僣汝卑勉汝無妄言言出禍汝隨誰識此懷抱獨自空嗟嘻贈適公上人喜得師消耗從僧問不休苦吟成白髮多病寄滄洲道氣閒尤勝書鋒晚更遒相思二千里阻别十三秋六合勞生耳休追萬事不雲蘿荒舊隱知友落新丘想嘆歐生逝應聞李氏憂師曩受國子博士李公深遇實與其子之竒相好李博士去豫得無悼念尋思祗如此必竟欲何求未即無言問方期勿藥瘳終為嵩少約築室共夷猶走久有嵩少之志去將有期因欲招師而偕往也一百五日同周越陳永錫遊吉祥僧舍痛飲方期數百杯尋芳何事又空回花愁酒困春無著却訝野僧蕭寺來題李士言秀才别貯帕蘭薰麝浥輕綃帕略許携持又索還題破白雲深有意要傳消息到巫山南陌南陌一雨後東風三月天殘花亂芳草輕絮散春烟景色真愁絶歡悰重棄捐倀倀有餘恨􅌬醁詎能蠲雨中牡丹萬金期勝賞三月破穠芳妬忌巫娥雨摧殘洛苑香怨啼甄后玉寒出貴妃湯掩斂無聊極誰來替斷腸思邊去年何時君别妾南園緑草飛蝴蝶今嵗何時妾憶君西山白雪暗秦雲玉關此去三千里欲寄音書那可聞聞報自崖徙雷因成一章從來崖貶斷還期聞徙驚雷衆共疑却訝有虞刑政失四凶何事不量移秋浦㑹遇并序大中祥符五年為海陵郡司理參軍居職以不能俯仰自全不幸為奸人所伺誣搆以事因被罪南謫為池州參軍貶斥中且聞所天之艱朝廷以罪犯不許奔哀窮寃悲苦生人所希寄一室於浮屠宫闔户竟日外絶還往留嵗餘遇赦聽以所釁聞將示之宥俱待命者前泗洲録事參軍清河張木亦受譴來是州前赦一月至與之居洎比接既相弔語且歡且悲張君簡篤有文信義人也自是遊處有日兩盡款慰若忘窮否之為爾豫自傷以艱憂中目不復視文字矧為聲偶之辭乎逮此竊有北歸望且感張相遇憂患間因思非言無以道厥事聊用拾之為長詩一千二百言匪以言詩也攄憤悒之辭也池州古秋浦地命為秋浦㑹遇詩云齪齪幽遐地栖栖㑹遇人窮愁艱理勝羈旅易情親豈意當漂謫兹諧卜並鄰溫溫窺表粹晏晏奉嬉嚬直道談端闢橫流語下堙綺文何斐疊瑰行亦璘玢敦分初投漆交言乍飲醇操心忠義合開口肺肝陳共昧隨時理俱成迷患因禍來非造次語及自酸辛衆奮漂山舌孤縻坐獄身詆誣惟腷臆鍛鍊正逡巡囚任桐棺躍寃寧斗劔伸君牽一作愆成很狄張君之寃由狄淳者深鍛鍊其獄而成之我患構姦秦秦應者本以嶺南小吏承攝州縣久而得真命官年七十餘通判是州為人狡多刻多疑納羣細之譛以豫嘗輒慢之㑹守郡者疾病諸從事皆他適得久專郡事遂與其下構豫之禍巧縱銛刀筆幽爭誷鬼神精誠懷皎月悲憤貫高旻素誓端清簡原作撿期無取玷淪斬芻嘗鼓篋卧藁先書紳側璧疑曾辨鉤金法所循得情奚示喜伏念不忘旬粗評去聲三章直何辭一馬貧決曹誠自任今之司理參軍蓋古決曹也司舉仰誰論録事參軍亦唐號司舉從事膺破藏奸柱綱埋翦暴輪存心固慨慕有位敢希遵驥騄程初發虹霓氣未振沮磨圭失色萋菲錦爭新肯或竒虛刃翻成害實賓木招孤秀伐珠掇暗投嗔跖蹻同非聖敦犨衆忌洵棘心終妬蕙蓬首不羞螓冶媚皆貍貉跳梁並狡㕙不無嫌虎據的是惡鷹瞵合力邪攻正連謀僞訾真蠅聲移枯楬渠列切蟻漏墊嶙峋抵玉為凡礫摧松作弊神椎埋眢直墮排陷堵潜填陡鄰切卑濕終投誼愁憂遂放均籲辜賖蓋幕照覆隔蟾踆流落窮山崦􅊂猶積水垠望家惟霣泣向國祗低顰艱毒天崩杞譴中聞朝邑府君凶訃邅危嵗在辰以丙辰嵗正月至貶所庭幃偏屺岵伯仲邈瓛璡愧未鴟􅊂死慙如渾敦嚚睢盱搖尾獸宛轉曝腮鱗已歎栖遲郡尤居寂寞濱土風傳細碎心事遘凶屯城郭周闕援人烟簇野津賈檣通徑越商帆扶泛切吹船進徹甌閩溪婦收菰米村娃貨竹薪回頭波渺渺動足石磷磷再見來巢乙𤣥鳥也頻聞入市寅虎每入市搏居人去滿林垂嘯狖當面走驚麕水寺傳將久沙禽漸欲馴無心從碌碌任志守諄諄早作慵洮盥宵眠獨歎呻几牀閒筆硯一作格窗牖亂書筠舊葛那支暑貧炊莫續晨未嘗遊井閈况復出城闉悒悒危腸潰昏昏病目瞤梅蒸衣醭黦瘴觸面黧皴未免雞猜鶴徒希鵲庇鶉素鵝求庾悅碧鸛事韋詵詎識開三雅奚論指一囷歡無官局事病免府趨塵避路深藏拙忘機獨任純鳶輕饑鸑鷟駑笑瘦麒麟一作騏驎瑕摘連城寶驚疑照席珍泥蟠蚖肆若塗曳蝘嘲頻機弛千鈞絭音卷剛摧百錬鑌慍憂宜悄悄讒吠更狺狺漸豆多聞耳全膠欲語唇已甘鍾律啞難鬭釜雷震平聲近歎非辜者還稱被譴臻堪持言自解姑以命相詢頓覺窮通外殊驚得喪泯平聲豈煩懷魯汶并說忘岐豳兹共追隨日時逢物景春雜花明浦嶼細草染郊畛音珍繡羽來穿栁糚鬟去采蘋畫船江泛泛銅鼓野鼘鼘于巾切荷芰卷生渚蕪菁秀出壣音鄰叢暄茶正發秧暖稻初勻逺去尋芳徑閒留坐翠瀕小蠻聊倒榼獨繭暫垂緡烟杪聞啼魄沙壖過祭獱道宫披古碣僧閣憑雕楯滯迹慙魚鳥梁蕭方等云吾嘗夢為魚因化為鳥方其夢也何樂如之及其覺也何優斯類良由吾不及魚鳥逺矣歸懷謝茗蓴後魏王肅事南朝好茗飲又重蓴羮及北還又好羊酪或問茗何如酪曰與酪為奴耳誰憐秦逐客自耿晉縲臣學憶居州里文曾力組紃曽倉祛秕稗任苑剃荆榛壯節輕宗慤竒才轢卞彬賦毫摛藻繪詩墨灑玭琳始覺詞場勝爭馳義轂轔戰瘤知景陷盟手敢他捘傳云涉他捘衛侯之手捘音于寸切又七􅘟反勇俟邀圭爵功期取鼎茵鄉書先鶚禰省薦半龍荀藝竊登廷試名叨擢帝宸闕嚴趨紫貝陛峻拜蒼銀變化初飛碧埏和却在鈞三年紆選調一命就陶甄冗驟司囹圄卑才服瑍珉上寮非遂霸同列異超珣介立旁無援陰排密有夤隄防雖少戅轗坷亦多迍繳已能傷雁罘仍未放麟踰年留異域肆㑹奉嚴禋仰問蒼蒼理難窮蕩蕩仁良圖君未騁薄命我方湮蓬藋何當返蘭荃自可紉肴蘇調㫖膳舂稅給租緡寄傲丘名麥遺榮野號莘退藏師李謐貴顯讓顔竣躡蹟三高士追狂六逸民耕臯營酒秫樵谷訪琴槆畚土封花墢誅茅出果榛前音臻此音詵園中持銚鍤林下設罝罠至理鵬齊鷃浮生菌等椿未甘捐糞土所幸曳絲綸南面同堯禹岩廊即甫申固應容一叟鼓腹得還淳穆參軍集卷上
