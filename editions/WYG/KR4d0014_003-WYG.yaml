body:
  text: 穆參軍集巻下宋穆修撰記任氏家祠堂記今上之元年尚書康懿公由參知政事出領太平郡居一年以齊國太夫人春秋益高至陳懇言以求本州以便其養詔尋從之於是復自鄆而即曹既至未期嵗屬齊國艱憂公遂去位而以私館居則盡斥絶糧肉弗視惟菜茹食以終日公魁碩人也至是頓被瘠毁體軀不支家人憂其憊甚爭諫止之乞稍進葷茹以是持助公曰吾頃服從王事有家靡居左右承顔情至闕違今日得請以終養尚敢不率盡子道耶皆不聴越三月竟以毁瘠而不起嗚呼公其可謂孝徳有聞也矣將終顧謂其子都官員外郎中師曰吾年踰六十壽不為少官至開府位不為輕今得收其躬以獲没於先人之廬亦幸矣然獨所恨者不克及吾之存畢先塋事耳吾俸賜之餘力足以舉爾其勉之惟速無緩都官念康懿戒付刻切時雖齊國在殯求欲苫廬守禮斯亦不得即以縗服畫而從事於外始卜其阡於曹之南近郭未及葬也日往自視樹墓柏或數千疲心瘁躬事以遽立既而治其第之側隅起作新堂者敞三室而鬭五位前後左右皆有宇以引掖之華以丹刻之飾六年春某東行見同年都官兄於曹一日目是宇而言顧我無以致孝愛於先親先兄將以是升畫像而薦嵗時焉苟無述也其何以貽厥聞請以是屬諸子某辱兄之命不敢讓乃言曰兹宇之設其近於家廟者邪惟家廟事自唐人修尚舊禮粗復其製時衣冠家襲行之始著唐徳而既往旋又廢於五代之兵興自是以來將相文武之家無復有言之者增築第産之盛則始患其不崇且廣終莫患其先廟之闕而不立古君子不敢以私䙝交於神明故制器服立宗廟以祀其先示誠潔也今人既用常所器服而又祭之於寢蓋亦不知事神之道使士君子之祭疑於匹庶人之祭久矣倘非世蹈名矩率禮敦教一作孝之族其孰克思之其族維何其在康懿公之門乎康懿公姓任氏自唐後五代晉漢周傳官不息以入國朝是興贈開府儀同三司太師尚書令兼中書令諱載儀同高才偉識籍聞當世徳豐以約委羨厥後實有賢子五人皆齊國太夫人白氏之出兵部尚書贈左僕射諡康懿諱中正其長子次中孚西頭供奉官閤門祗侯次中行尚書兵部員外郎次今都官郎中也最季中立左侍禁閤門祗侯供奉逮兵部皆先康懿並終今從享於儀同齊國左右儀同特立於中室以東室為齊國之坐康懿位西室而清河郡夫人張氏陪焉兵部供奉各處二側位其嚴慈之尊長幼之序煌煌遺像堂堂如生宗屬以之視瞻精爽以之馮附烝祀有所不潰其䖍斯肅其神斯饗孝之至也禮稱有其財有其禮無其時君子不為也廟祀之事不作已久求矯行之必取世讓時所牽制禮不獨伸則家廟之名既罔得而有其昭穆之位固無因而列是以顯考主父神人不敢盡陟而時享合敘抑有常焉矧案前代私廟並置京師今本不從廟稱而復設於居里敢請號曰家祠堂者信適事中而允時義矣噫家廟者豈可不復矣乎苟復之則已如未之復則斯堂也於奉先之道得一時之禮矣蔡州開元寺佛塔記西佛氏法唱中夏為寺宇於中夏先王之遺民樂聞其法尊雄一旦從而和之棄世守常義弗顧而為其徒者靡然傾天下西人之業胡其如是之盛耶豈佛氏之法為能本生人惡欲之情而導之耶不然何以能鼔動羣俗之心如趨號令之齊一也夫生民之情大矣聖人知其不可先也為之著禮明義以節養之使不流不窘安其分盡其常以生死焉而不及他道者三代之民也今佛氏之法後三代而作極其說於聖人之外因斯民所惡欲而喻以死生禍福之事謂人享有於其身者皆由死生往復而取之方於植物者根夫善善以之而生於今種夫惡惡以之而出於後其為貴為富為壽為康寧皆根夫善者也而統謂之福為賤為貧為疾為夭皆種夫惡者也而統謂之禍福禍之報不移也世聞其說甚懼謂死且復生則孰不欲其富貴康壽而惡其賤貧疾夭雖君子小人一其情也然何如即可以違所惡而獲所欲曰非去而為佛之徒讀佛之書則不可人所以悦其法而歸其門者為能得已欲惡之心乎佛亦安能強使人附之哉如死生禍福之說使禹湯文武周公孔子亦嘗言之則人亦必從此六聖人而求之如其聖人所不及惟佛氏明言之則人焉得不從佛氏而求之也予謂世有佛氏以來人不待聞禮義而後入於善者亦多矣佛氏其亦善導於人者矣嗚呼禮義則不競宜吾民之皆奉於佛也宜其佛之獨盛於時也佛日益盛徒日益繁則當其異行之士奮臂而出力樹塔廟誠佛事之末苟以時觀之能恢赫顯灼使人見之一作目之起恭生信則無如塔廟助佛之大故雖窮逺僻阻川塗所在必有佛之塔廟以瞻嚮於俗也矧中州近壤之衝㑹乎然而佛塔與廟抑有其說中藏像事而旁栖徒衆者實為廟惟佛塔之說當必得親佛所遺爪髪齒骨一種或積精力所成如珠璣類者釋氏皆所謂舍利是也然後函以金石竁地而蔵焉因起浮圖於上以表識之是曰佛塔耳諸所立者靡不然蔡州開元佛寺其踊甓成七級浮屠者是謂葬佛項骨舍利焉其始自雍熈四年故相太子太師吕公為郡日其佛骨自京師降吕公尋而去郡以屬僧志者俾後興塔於寺以葬奉之後志方肇心㑹卒曰僧榮者復上承之自是迄大中祥符初榮始再議所舉得喬張二豪吏歸入資用僅獲就事於時浮屠纔基一級而已榮終度力難以竟即又罷去於是州耆釋叟衆惜其迹已植而止相與謀其可以終事於塔者復得寺僧海微而請之微一本無四字起應請實堪其任今塔之所以獲立自海微力塔既立未致備飾而微殁時天禧二年也付其事於門人永昌纂之永昌紹成師志罔有暫懈悉心募力未幾而闕飾云具其範鐵塗銀頴然而擢立其端者是曰相輪其棟石甍瓦翼然而周蔽其址者是曰散水計二事役費於浮屠亦三之一焉皆永之為也永其可謂善繼師之勤矣較三四釋之功是則肇於志而基於榮克成於微而大備於永雖經始營為殊先後鉅細其因作之蹟則皆有力於塔者其所謂異行之士歟塔始於大中祥符初訖於天聖之六年出入二十年之際厥有成績其糜用財力積劇亦至矣永師列其本末來請得以著成於記養正堂記韓君堯言登進士第九年始再任為泗州録事參軍到官之五月以廨舍促狹由視事㕔一本有則字達乎寢地矣晏休之地俯㕔西北隅先有屋數楹已故敗就摧因令堂而新之以備其所為晏休於時河南穆修訪君淮上目其始立君曰為我命以名而記之即從而言曰堯言少年以文辭上第其視富貴為朝夕事今十年間乃猶盤回效州縣職屑屑以斗石禄為急著公衫把手板旅進退郡庭下瞻望上官顔色非為計之得矣不獨如是復為讒狡小輩走謗議其間諠譊不已所以古人憤悒脱官委印綬不顧而去蓋此也堯言曾不以是動其心汩汩隨波上下無所可否獨何歟將有其說人抱蓄才識凡得以施用者不有高位當遇知已去是則才之與識或不可使以外發發輒受攻於物知乎此者近易之蒙蒙以養正之謂焉非變通之才孰取之今堯言居是職其有以幾乎予與堯言交舊而復同年登科不謂不知其平昔放逸豪偉真無顧避坐有論說不輕以氣語抵人至是乃能刓鋒稜藏戢崖岸約束若纎謹男子為者終日挈挈守其曹事不少為俛眉動容起倦怠意真可尚也堯言既為斯堂將施名而屬予予悦堯言所守從而得堂之名即命其堂曰養正既命之沿其名以為記亳州法相禪院鐘記古之為鐘其用大矣樂記稱黃鐘大吕又春秋傳稱師有鐘鼓曰伐則是鐘為禮樂之備又為征伐之具其用之大樂可以調陰陽感人神導天地之和用之軍旅可以讋不軌懼不庭振邦國之和考是二者則鐘為禮樂之器久矣三代之際以及秦漢皆不變其用今是鐘也專為釋氏之器亦從可知也東漢之運將季西域之法聿來流晉宋而益崇涉齊梁而大盛率天下而從其教擬王者而闢其居無王公無士民無高卑貴賤豈不從而信奉之不從而依皈之以求其福報乎如是則盛矣大矣佛之為法也既與中國聖人之道並行於時則所謂禮樂征伐之器安得不入於佛之宫哉佛之宫其徒羣栖而旅集多者數百人而居之其朋既繁不常厥處將齊彼衆非言得道則必聲物以齊之求物聲宏達而及逺者莫踰於鐘是知鐘為佛宫之用其在兹乎亳州法相禪院有主院僧海宣者謹行之僧乃勤以募衆崇掲土木門堂殿廡總百餘間多宣師所及也聚徒侁侁資膳悉備警旦暮者其闕惟鐘州人時氏豐財好佛之士也一日詣宣而謀曰一鐘之費其用幾何願輸其貲獨營斯善師即計其用度告之遂以銅若干斤師復謂曰鐘之成也匪高弗居則并請為居鐘之樓以此土不産美材因命僧海真南扺於舒鞭其材木匠為成器而離之自舒及譙使以舟力雖皆出時氏然能減費便事者蓋二師心計運度之謀也天聖元年春始召鐘人興其鼓鑄液彼金錫一冶而成鐘事既立樓材亦至建於殿南東偏居鐘於上層甍翬飛雙欒鯨震嶷嶷崇構上凌烟空琅琅洪音逺落霄外於以壯觀精宇於以號令羣緇且叩焉使思所以息晦明風雨不迷厥時據釋氏言鐘之聲扣之可以上極天界下洞幽泉導死者㝠昧之魂出地獄沈淪之苦故死者之家嘗賂金帛衣物求擊其響若如其說則非獨用之節昏曉戒食寢而已又復能售極苦之資助釋氏之費焉鐘不可闕於佛亦明矣靜勝亭記州郡有兵馬監押職設今代專督州中姦事火盜洎軍籍庫兵商征酒𣙜之事則皆與守同管署自政賦財幣刑罰獄訟之煩則一不一本有用字及其職位優其務守簡蓋士之階武而升者非力勞久十餘年不被兹命凡尸之者能持謹常不失局事鉅細筆不闕可否歸之州足為稱任雖材且無所施顧或每每好用自擾以昭權樹威而病其職者多矣潁川陳君永錫始以公侯裔縻迹落武一再遷為右侍禁蓋漢之郎將類也來監蔡之羣戎為人力文服古而雅任闊達樂所守無事惟比旦一過㕔還則擁書自娛常言吾職甚逸吾性加疎思得洒然空曠一宇為寄適之地盡糞除耳目俗譁而休吾心焉廨中舊有亭其制卑而久為之易去故材俾豐宏之前數十步間夾樹畹蔬蹊果之外先峙射堋堋豈徒趣中宜有哉然於亭甚逺不大與亭害故亦不廢姑存之亭成陳君謀予以名予請以靜勝命亭陳君之飾是亭豈志於靜者邪夫靜之閫仁人之所以居心焉在心而靜則可以勝視聴思慮之邪邪斯勝心乃誠心誠性明而君子之道畢矣惟陳君能有是道故有是亭人苟不果其道名無益也是無實而守空器也不與夫盜名而居者比歟後之縻斯職據斯亭者亦復能悦靜而思勝乎苟能善矣無為自擾而病其職以守亭之名為亭之媿也明因院羅漢像新殿記去縣治之東南越三十里有浮屠居曰明因本淳化中之錫名也浮屠師業者紹居之能勤飭其軀靡懈以裒力於民之里召塑工為五百像釋謂之羅漢者加新其殿構而納之辛亥嵗夏五月告畢工師求記之以文予儒者稱浮屠之法懼非所能請以目所嘗覩浮屠者並縁土木佛事終依之為姦以幸其身而敗汙其類者言之亦足以昭師之善矣予行天下往見山墟林野間有級磚以為佛塔者其址之豐若將為百尋之高或不數尋而罷有植木以為佛廟者其基之博若將為百楹之廣或不數楹而止其委甓餘材猶棄積於下訪之其側則曰始佛之徒也將欲有為於是張其勢甚盛苦其行甚篤至能黜衣退食盡用於佛初人大為傾信而悦助之貲斯萃欲斯至自是每十其獲不一入於佛常私其九以自取人復覺之信遂以衰以故卒無有立而亡去之予謂此無他也由始信而終欺也宜其無成效焉凡倡事之道已必先信猶懼人之莫應矧已為不信而欲人之應世未之聞又獨釋氏哉今師營是像作是殿必有得於信之術矣不然何能遽有就之如是也嘗聞東南人尤嗜於佛至有傾貲舉産以為奉而無愛者師向後能益謹其術而待之庸知里人之有力者不盡為師之奉也墓誌銘祭文東海徐君墓誌銘進士徐君孝山喪其父執喪之三日得友張生道卿所録文事拜且泣復授之張生并繼以語俾來請曰孝山未即殞生尚惟喪事不可緩將卜葬以某日期日且迫敢迹其日托銘於先生用刻而納之以光永幽穸予既受而閱其始卒乃謂曰是葬也蓋得其禮矣比今貴家富族將葬其先必惑葬師說拘以嵗月畏忌大至違禮過時久而不克葬者多矣生能葬以其道至合士禮逾月之制此獨可尚又安得拒請而勿銘也按君諱文質字處中其先祖父嘗寓籍并土之文水逮君之考猶為晉人考生未齔而孤見教育於季父氏既而復㑹朝廷以兵取太原大徙并民入處之京輔考於時與其族來京師遂家焉自是得遊太學為生徒治春秋經傳前後四舉有司竟不及禄而終考始娶潁川陳氏女亡再娶清河張氏生男子二人女子二人次子曰文蔚少卒獨君為前陳氏所生二女今皆適京師良族由君而下始為京師里人凡并人其俗剛厚而勤嗇能自節損以立衣食諸來徙之戶初雖貧劇者居久而皆為富屋矧其宿有齎者益可知故考亦用是而殖其家考之殁貽其規法於君君於此益為之善守者也君常念陳氏早世又傷父之不逮故事後親彌盡其力無何數年張氏又終初君亦嘗受經於儒官馬龜符有慕仕進心至悼親之繼喪顧門中時無强子弟可任惟懼覆先人遺業則為不肖子因刻力事生於家非時節慶弔不出門如此蓋有年天聖八年適五十忽得疾醫累月弗愈以是年七月十七日卒於居君凡四娶室輒先喪有三男五女初室季氏無子長子孝山實出次室李氏次景山徳山皆未及娶五女子亦幼在室孝山及諸弟妹合族謀葬得其年八月之二十一日藏君於東京之祥符縣開封鄉西韓村先墓之次以次室李氏為合初季氏次苗氏李氏三室皆同穴而異棺斯實禮也銘曰惟古之葬等殺異宜日月有數無越厥期末代不然惑於葬師陰陽拘忌率常過時其孰警此伊徐氏子以時而葬順禮之軌既合既祔有銘有紀如君之藏民亦鮮矣祭第二子文月日阿爹以果子飲食弄具祭於第二男道子之靈嗚呼汝生而慧嶷體質粹竒舉家愛憐保養甚厚始三嵗則微有知見見詩書能舉能視吾與汝母其喜可勝謂汝他日必大吾門如何不永四嵗而夭嗚呼哀哉汝殁之辰我客京師家避吾驚不以時告我之既還聞於中途延道哀呼知無及矣但與家僕相持殞絶嗚呼生人之理有幸不幸惟彼頑塞輒踐遐年念汝豐完反成殤子嗟乎天道既使之育育而不長孰如勿生免此大痛嗚呼汝舍我去無期復還我思汝悲何時而已汝王父王妣旅櫬未葬俟畢先壠以歸汝骨草瘞郊次祖母俯近此魂有依無至驚怖父臨祭汝汝其享之號厥終天相期泉壤尚饗穆參軍集巻下
