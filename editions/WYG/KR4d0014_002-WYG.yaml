body:
  text: 穆參軍集巻中宋穆修撰書序答喬適書月日河南穆修白秀才足下近辱書并示文十篇終始讀其命意甚高自度淮西來嘗見人言足下少年樂古文固可聞而心存之但未敢輒輕信人說今遂果知足下能然蓋古道息絶不行於時已久今世士子習尚淺近非章句聲偶之辭不置耳目浮軌濫轍相迹而奔靡有異途焉其間獨敢以古文語者則與語怪者同也衆又排詬之罪毁之不目以為迂則指以為惑謂之背時逺名闊於富貴先進則莫有譽之者同儕則莫有附之者其人苟無自知之明守之不以固持之不以堅則莫不懼而疑悔而思忽焉且復去此而即彼矣噫仁義中正之士豈獨多出於古而鮮出於今哉亦由衆勢驅遷溺染之使不得從乎道也觀足下十篇之文則信有志於古文矣其書之問則曰將學於今則慮成淺陋將學於古則懼不取名於世學宜何㫖引韓先生師說之說以求解惑為請足下當少秀之年懐進取之機反學古於仁義不勝之時與之者寡非之者衆不得無惑於中焉是以枉書見問某不才而棄於時者也何足為人質其是非可否徒以退拙無所用心因得從事於不急之學知舊者不識其愚且戅或謂之為好古焉故足下以是厚相期待者蓋感其聲而求其類乎可不少復其意邪試為足下言之夫學於古者所以為道學夫今者所以為名道者仁義之謂也爵禄之謂也然則行道者有以兼乎名務名者無以兼乎道何者行乎道者雖固有窮達云爾然而達於上也則為賢公卿窮於下也則為令君子其在上則禮成乎君而治加乎人其在下則順悅乎親而勤修夫身窮也達也皆本於善稱焉務夫名者亦固有窮達云爾而皆反於是也達於上也何賢公卿乎窮於下也何令君子乎其在上則無所成乎君而加乎人其在下則無所悦乎親而修乎身窮也達也皆離乎善稱焉故曰行道者有以兼乎名務名者無以兼乎道有其道而無其名則窮不失為君子有其名而無其道則達不失為小人與其為名達之小人孰若為道窮之君子矧窮達又各繫其時遇豈古之道有負於人耶足下有志乎道而未忘乎名樂聞於古而喜求於今二者之心苟交存而無擇將懼純明之性寖微浮躁之氣驟勝矣足下心明乎仁義又學識其歸嚮在固守而弗離堅持而弗奪力行而弗止則必立夫名之大者矣學之正偽有分則文之指用自得何惑焉不宣某白上大名陳觀察書觀察閣下修嘗病近世以來文武異道將相異材為弊於時久矣古之所謂文武之道蓋一道也但治亂之用殊所謂將相之材皆通材也由出處之寄異未有不達權謀而名能相國者未有不名學術而名能將兵者則古之取將相也率由文武之道一焉近世則不然謂儒為文謂卒為武苟登之為相矣則不復寄以軍武之任而曰此文人也不足語以武苟拔之為將矣則不求以儒術之學而曰此武夫也不當責以文時既擇將相之具不同人遂目文武之術為異時之所以不得其人人之所以不盡其用其弊皆岀於此乎修嘗願識如古之賢傑之人文究經綸武洞權變弛張諧物理動靜應機會陽開陰合與鬼神造化爭其功用無所施而不得者如此之人逢其時運其才出入乎文武將相地使剛麄匹夫號名主將者觀之聞之色死氣喪俛首聼命知將相之道不在乎彼而在乎吾儒也豈不偉哉求之當今他未獲睹惟服閣下之才德風略於斯有年矣伏惟閣下名極而望峻識淵而量宏視鼎甲之第於當年若掇遺物之易蹈霄漢之衢於平昔如馳坦途之速周歴清美深集禁密言蔚典册筆動雲雨當斯之時天下之人其言閣下之文章真辭臣矣一旦奉明詔去内廷統將符專外閫奠枕攸倚來藩北門命下之日威聲四出當斯之時天下之人又言閣下之氣略真將帥矣天下之人所以稱之如彼者何如此者何非私言也抑以閣下之才全能鉅無施不稱文徳武備靡不在躬也附衆却敵靡不如意也以是而天下言之耳然則雖古之賢傑復生諒何以加此修可不向風馳想氣激神竦求一識大賢君子之風采忽不自知其貧且賤贏糧躡屩來及魏都亦既至止復彷徨蹢躅不敢徑進則訪謀於諸府僚從事或有言曰公性深沈不測也始聞之甚懼且疑徐念之則悟以解曰彼言公嚴急難犯者其非也古方負天下文武之望以賓接士大夫為切務顧肯肆嚴急難犯之性損其容納度量乎斯不然矣彼曰深沈不測者宜有之凡大賢君子動作施為皆不使人窺其涯畔今公柄國任重殿河朔上流禮接邊鄰鎮靜方域非深沈不測其何以制逺御衆乎苟行事深淺動為人料其孰曰大賢君子乎其深沈也則宜矣既以是解之因從而語曰夫深沈不測則臨事好思臨事好思則心存黙識今公誠如是則賢不肖進於前必有所取舍矣宜夫小人萌進見萬一之望焉敢用致書數百言於左右以為請見之禮俯伏棨㦸之下以俟進退之命閣下賜與之見則敢進見實旅人寒士之幸也不賜與之見蓋羈薄之命不獲遇於大賢君子之知矣窮達進退庶卜是日敢不惟所命之伏惟少賜憐察幸甚修再拜上潁州劉侍郎書月日某謹齋戒擇日裁書百拜有聞於密學侍郎閣下竊惟哀矜惻隠君子之常心困迫饑寒小人之切患倘以小人困迫之患仰扣君子哀矜之心苟君子不聞則已其或聞之則必動於心大則必見於色當為咨嗟慘怛憫而矜之雖未知必假之大恩與否其無拒絶弗顧之理明矣某是以不敢疑懼期得愬於府廷之下庶窮悴之迹少或布聞於左右知獲黷犯尊威之罪而難用黙黙自已者其勢誠危且窘也某死罪某以大中祥符初竊進士第解褐為泰州司理參軍時年齒且少心壯氣銳實不能與俗相俯仰謀為自全之道卒以是累一旦挂於刑章毁官喪禄斥為敗具於今十年初為池州參軍日屬所天奄殁朝廷以始得罪譴不許奔憂時國子博士辛公公之外舅也方為是郡哀其艱禍窮蹙特以事聞果允朝㫖聴其北還因獲生見老母穉弟於京師不然非辛公之力將以悲憂死諸江外常念辛公之賜厚矣某家園素來貧虚歸不足以給養其生奉老母既茫然無依因即栖於京師亦無他圖以其都㑹之地平生遊舊或時得逢悲其窮者輒有分濟至將丐四方大扺取塗似便以故久寓京師困不能出家雖寄託京城一身常奔走道路老幼十口食於一身遑遑終嵗且不能周其􅊡粥今春國家恩詔特下失職尤累之人許以自新由是某竊有食禄之望半年住京延伺一命雖室有十錢之物亦盡為薪米屋直之費無何二月之詔裁寢某嘗與十一人同詣宰相披告其下五人獨得自新之典惟某六人復置散地但某受是命抑不敢不知幸焉文學掾古之美名汝陰郡今之善地守兹郡者復朝之重賢得古善地而事重賢信為幸矣然事有便於名而不便於實安于公而不安於私者雖聖人將不能以居焉某昨自趨府之後退伏逆旅舍中所相親者惟形與影耳每念年高之親旁無兼侍計日所食殆絶而莫續念之至此則不覺心目俱㫁涕沾於襟將為之奈何因自謂曰憂思無益也今為孤親之計莫如直以誠言於旌斾之下使重賢君子察而知之然後乞告歸養以慰倚門悽悽之望將無不可者故官無職事所守俸不救於口腹潁上昔未嘗遊足無可及之門是乃真郡中之長物爾久留此將不難死於窮餓一身窮餓而死可也如老母何如幼稚何是以不得不以誠而自陳所謂以小人困迫之患叩君子哀矜之心識者必謂之逆理而動惟寛明仁惻矜而察之優而容之不加大罪則生死幸甚情志殞迫辭無縁飾干冒尊聴憂灼失措上監判郎中書月日具官某謹拜手書于監判郎中執事某為兒童嵗多依外門祖氏家由是得服執事之名久矣逮十嵗計從先君官南北則不常其居年已長即入舉子塲於時求進為人事羈束皇皇汲汲至於今不獲一拜盛徳於左右往年見先君聞執事拜官寵澤優渥時謂某曰昔日汝外王父屢與吾言及其僚友家子弟敦偉可器量者獨曰邢君久逺職位不同吾輩幸記之今誠騐其語汝外王父可謂知人吾為太學生時亦嘗辱邢君遊他日汝見之必修子姪禮小子奉是言不敢遺忘於時某方再舉於有司雖一名似失所望其後選授泰州司理參軍區區曹掾未終秩而釁禍繼作所天奄喪艱苦無訴去冬適自南歸一家貧寄京師薪水不給老幼數口嗷嗷待哺相視未定旋奔走於外以謀其食越春涉夏無時少息所以未遑進見於執事者蓋此也近日思京城都㑹之地苟無俸入儲蓄之備未易久居方謀今秋將家遷汶上鄉里葺先人故田以奉老母之膳因自為息身之計既如此即望執事之門愈將無及矣重念先人忝執事疇昔之舊不能當此時一請見門下是自取疎外於長者而不行先君往嵗之命也前數日竊不度量遂造於門館既獲以名通伺命遷延間蒙執事辭以他故彷徨引退愧生於顔歸自思之曰執事所以拒而不見者責其進謁之晚故也執事其實未盡察之亦宜乎責其已晚也某又豈敢以必見望於執事雖然苟黙而不以言自解其所以進謁之晚之故則是終得罪於長者足以為恥今盤桓忸怩數日而復進其言庶幾執事覽其言而盡賜察知或哀以故人之子而命見則復敢以見如不命以見則終不敢見惟執事諒之不宣某再拜送李秀才歸泉南序景徳四年與泉州進士李君相識於京師遊處且久於時予與李君俱少年有壯心操紙筆入都省應主司之試躍躍有矜負之色窺科級跂仕進自待期者甚鋭明年春不幸則皆無成以罷後月餘遂各去京師而歸其居地既逺且絶不相聞知如是别者十一年復會於京師得一舉酒而相歡對一語及往舊事慨焉不啻如夢面老而心衰則相與皆然也予中間雖僅成一名今又失其禄食子則猶舉於進士塲中嗟乎予與子嚮之志願百莫從其一二而意態度十已亡其六七信乎人物於天地間甚易老且死耳别十一年而一相聚顧昨日之少壯忽已凋耗今聚未久而復别别聚苟又加如是知他日之相視復不如今辰之視昔也必矣今子别我而歸我眷眷而不已者其以故人也其俱不得志也其相逺而難相聞也其會之或賖於前也其將為之奈何請且序情而歌事以為子送詩云閩越子所家告以歸期征行語黯將發憤氣一作意鬱以盈男兒志未就口腹常不營胡為京城中日與芻豢爭隋河二月路栁色傷逺行十千大梁酒金罍為君傾酒酣微悲歌衆坐皆聳驚去矣丈夫别安事兒女情張當字序春秋之法書字為褒有以知君子之尚其字也然則古之君子名與字相配配字者所以表名也清河張君當始字友直猶以其取義未安也而訪之僕辱其久遊不獲讓為一作焉徐思之因請更字曰元膺方前字於義為洽而又正與名會且元為長善則仁義統稱士能膺之行孰大矣張君以辭學累舉進士始得明之定海尉位雖卑才不踰一作其職與其位甚尊而才甚愧者孰賢愚焉予既為述其字又以勉其行故為之序送魯推官赴南海序為人之佐其難矣哉夫令而行之者其長之所專也從而輔之者其佐之所守也凡政有害於公有悖於理知而必言此已所可為爾言而必從豈已之所能哉苟上無必從之勢則政有必失之患為之佐者罪先及之故曰為人之佐其難矣哉然則如何其可也曰盡其職而已矣居上者賢已當公而正之不賢已當直而輔之輔與正非已之職歟正之而不從則雖獲罪乃有之矣於其職也實無愧也今之從事於二者或莫率是道不涉於欺則陷於隨居上者其人果賢其政果明是宜順之於下以成其美已則曰我為人佐遂能無一為之損益吾何以食其官即強白黑以分亂之此非欺而何居上者其人果不賢其政果不明是宜直之於下以救其過已則曰我為人佐言不吾取事不吾專力與為敵徒速悔累曷若附離倡和取容免責苟全吾位而去此非隨而何予謂士之居其位事其人既不可欺亦不當隨不欺不隨惟職所宜而已矣魯君以詞學中選自邑佐而遊郡幕皆有所稱今將復佐於南海南海際南之鉅府也方聞其長則天子諫臣賓接僚屬當奬正與直用是知志必上行苟上下協公以從於理予見南海之政獨追於古而荒夷之民大浹其恵也送李秀才應陳州舉序陳許於京師猶唐之視同華實四方藩輔之府來鎮其地者常自大官出故每貢士嵗進士獲名送於書者其榮與王府偕今上之四年太傅隴西公領陳之四年也隴西公之賢時莫不聞禮才接善博收而廣納不以位望驕物四方之士走陳而獻藝求願日伏於門進士李生諷前一年嘗自蔡往以其業修請謁禮一見獲遇甚厚自是復歸探學尤至益有聞焉今兹嵗㑹闢選舉生將韞挾其技舉於陳同儕輩欲生留於斯者或解以他語予謂李生是舉往得宜者三焉隴西公喜能樂善固材駿所歸地首藩輔其名躅易發而光且復聞舊貫在焉有是三者可無行乎其戒子僕其秣子駒吾將餞子以壺而送子於塗送吕公初序為善汲汲於報報未至則更而去之末哉學者能顯窮一致蹈道自樂而不變庶幾君子之志者耶與其達而安不若困而固之之難也公初生於儒門趨庭聞道為名進士十五年僅能獲一第後數嵗始選得州參軍日趨走塵土執下賤事充充乎貌言未嘗為可憐之意予知其道固於内外物不得間而入也不然豈免誹怨呻呼駴躍發於中而表之也歟居職踰年以家艱去之蘇予重其别先行以告曰慎無中廢則豐報且將及豈惟寛裕於賤用哉送崔伯盈序士困窮而篤於學庶民困窮而篤於利學與利亦久且博哉或泰於交或數世而弗斬焉庶民日贏日陷若坳坎聚潦不注則涸故少息則怠及學之利也蓋異於是焉伯盈篤於學者也三十年而益困未知所以為利今嵗詔罷舉妻死身病子單母寄海上思侍以孝之道困不能往因射他州之有無者居諸槖將自潁以之伊洛走秦中都浮筤蕩波龍藏泊過姑蘇入吳興出谷水寧省於東安少進於越扺句漏圖庶民之利者將行予慮君幹於貨而落於學故序庶民之道以告焉穆參軍集巻中
