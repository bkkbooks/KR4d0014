body:
  text: 哀穆先生文蘇子美嗚呼穆伯長以明道元年夏客死於淮西道中友人蘇叔才子美作詩悼之遣人馳弔之痛夫道不光余又次其一二行以鑑於世為文哀之先生字伯長名修幼嗜書不事章句必求道之本原皆記士徒無意處熟習評論之性剛介喜於背俗不肯下與庸人小合願交者多固拒之議事堅明上下合古皆可録然好詆卿弼斥言時病謹細後生畏聞之又獨為古文其語深峭宏大羞為禮部格詩賦咸平中舉進士得出身調泰州司法參軍牧守稱其才二郡者惡之又嘗以言忤二郡㑹守病二郡者私㸃吏使誣告先生賂具獄聚左證後乃召先生使衆參考之由是貶池州中詣闕下叩登聞鼓稱寃令二郡者死復受譴於朝後纍恩得為蔡州參軍先生自廢來讀書益勤為文章益根柢於道然恥以文干有位以故困甚張文節守亳亳之士豪者作佛廟文節以騎召先生作記記成竟不竄士名士以白金五斤遺之曰枉先生之文願與此為壽又使周旋者曰士所以遺者乞載名於石圖不朽耳既而亟召士讓之投金庭下遂促裝去郡士謝之終不受嘗語人曰寧區區糊口為旅人終不為匪人辱吾文也天聖末丞相有欲置為學官者恥詣謁之遂不得嘗客京師南河邸中往往醉暮歸過之如不省持者夜半邸人猶聞其吟誦聲喟歎聲因隙窺之則張燈危坐苦矉執卷以至曙用是貸其資母喪徒跣自負櫬成葬日誦孝經喪記未嘗觀佛書飯浮屠氏也識者哀憐之或厚遺則必為盜取去不然且病或妻子卒後得柳子厚文刻貨之售者甚少踰年積得百緡一子輒死將還淮西道遇病氣結塞胸中不下遂卒噫天之厭文久矣先生竟以黜廢窮苦終其身顧其道宜不容於世然由賦數踦隻常罹兵賊惡少輩所辱困其節行至死不變有孤懦且幼遺文散墜不收伯長之道竟已矣乎初先生死梁堅自解以書走上黨遺豫欲訪其文俾豫集序之去年赴舉京師歷問人終不復得一篇惟任中正尚書家廟碑靜勝亭記徐生墓志蔡州塔記皆平昔所為又不足成集今舅氏守蔡近以書使往其家且求其所著文字未至間作文哀之道不勝於命命不合於時吁嗟先生竟胡為二蘇先生悲穆孟二子聨句穆伯長孟陽伯有客自逺方來以二子說穆子疾病初家事巨細缺鄰人苦其求才翁醫師久已決案杯大小空布被旁午裂餘喘尚能鼓子美老憤知已結目凄望羊泓髭斷反蝟茁憂酸繫餘生才嘷呼留永訣語妻後日計書䇿未可撤教子立世資美圓曲弗自恱吾屬何流離衆人方草竊妻子久道路才十口著羈絏恰旅重江間正值大饑節既而裹飰交美疾走繼粗糲又無執漿人及時沃枯渴惜哉殞天命才痛焉在親絰帝胡生爾身世復稱爾傑胸伏氣萬丈美腸貯怨百折艱難泊風波憔悴墮霜雪老僕勤龍鍾才弱女癡䠥􅍷文隨寒餓空道與烟熖滅魂兮竟何歸美去矣不得别長府豈無財莫濟醫藥切太倉豈無粟莫解腹腸熱才天子聖在上海內濟欲徹伊人胡不官既死安得活美朝青與暮紫神喜天不軋高車與怒馬才門滿道不絶之子苟閒厠斯民乃貪餮穆參軍集附録
