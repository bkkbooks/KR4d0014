body:
  text: 穆參軍集别集類二宋提要臣等謹案穆參軍集三巻附録遺事一巻宋穆修撰修字伯長汶陽人事蹟具宋史文苑傳蘇舜欽集有修哀文稱其咸平中舉進士得出身而集中上潁州劉侍郎書稱某以大中祥符中竊進士第邵伯温易學辨惑亦稱修為祥符二年梁固榜進士則舜欽蓋偶誤矣解褐授泰州司理參軍以抗直為通判秦應所誣搆貶池州再逢恩徙潁蔡二州文學椽明道元年病卒宋人皆謂之穆參軍從其初官也修受數學於陳摶先天圖之竄入儒家自修始其文章則莫考所師承而歐陽修論尹洙墓誌書謂其學古文在洙前朱子名臣言行録亦稱洙學古文於修而邵伯温辨惑稱修家有唐本韓栁集募工鏤板今本栁宗元集尚有修後序蓋天姿高邁沿溯於韓栁而自得之宋之古文實栁開與修為倡然開之學及身而止修則一傳為尹洙再傳為歐陽修而宋之文章於斯極盛則其功亦不尠矣據蘇舜欽哀文稱訪其遺文惟得任中正尚書家廟碑靜勝亭記徐生墓誌蔡州塔記四篇不能成巻祖無擇集有修集序稱其遺文於嗣子照得詩五十六書序記誌祭文總二十次為三巻其序作於慶厯三年所列詩文之數與今本合蓋此集猶無擇所編之舊王得臣麈史述史驤之言譏其作巨盜詩以刺丁謂為有累於道考邵伯温辨惑載修於丁謂為貧賤交謂後貴修乃不與之揖謂銜之頗為所軋修集中聞報自崖徙雷一章即為謂作則驤所謂累於道者病其挾私怨耳然其詩排斥姦邪尚不至乖於公義未可深非又葉適水心集譏吕祖謙宋文鑑所收修法相院鐘記静勝亭記二篇為腐敗麤澀亦言之已甚惟第三巻之首載亳州魏武帝帳廟記一篇稱曹操建休功定中土垂光顯甚大之業於來世又稱為帝之雄使天濟其勇尚延數年之位豈強吳庸蜀之不平又稱至今千年下觀其書猶震惕耳目悚動毛髪使人凛其遺風餘烈又稱高祖於豐沛光武於南陽廟像咸存威徳弗冺其次則譙廟也云云其奬篡助逆可謂大乖于名教至于述守臣之言有吾臨此州不能導爾小民心知所奉是亦吾過云云顯然以亂賊導天下尤為悖理尹洙春秋之學稱受于修是于春秋為何義乎自南宋以來無一人能摘其謬殊不可解今承睿鑒指示使綱常大義順逆昭然允足立天經而定人紀豈可使之仍厠簡牘貽玷汗青謹刋除此文以章衮鉞其他作則仍録之用不没其古文一脈篳路藍縷之功云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
